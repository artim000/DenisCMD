<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Команди Дениса — колекція Minecraft команд з пошуком та фільтрацією">
<title>Команди Дениса</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0f1923;
  --bg2: #162030;
  --bg3: #1c2d40;
  --surface: #1e3a4a;
  --surface2: #254d63;
  --border: #2d6b80;
  --accent: #22d3ee;
  --accent2: #4ade80;
  --accent3: #facc15;
  --text: #e2f4ff;
  --text2: #94b8cc;
  --text3: #5a7a8a;
  --sidebar-w: 340px;
  --font-size: 14px;
  --radius: 4px;
}
[data-theme="light"] {
  --bg:#e8f4f8;--bg2:#d0e8f0;--bg3:#b8d8e8;
  --surface:#ffffff;--surface2:#f0f8ff;
  --border:#7ab8cc;--accent:#0891b2;--accent2:#16a34a;
  --text:#0f2d3d;--text2:#3a6a7a;--text3:#7aabb8;
}
[data-theme="minecraft"] {
  --bg:#2d1b00;--bg2:#3a2200;--bg3:#4a2d00;
  --surface:#5a3a0a;--surface2:#6b4a1a;
  --border:#8b6020;--accent:#78be20;--accent2:#f5a623;
  --text:#f5e6c8;--text2:#c8a870;--text3:#7a6040;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:var(--font-size);scroll-behavior:smooth}
body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;transition:background 0.3s,color 0.3s;overflow-x:hidden}

[data-texture="grass"] body::before,[data-texture="stone"] body::before,[data-texture="wood"] body::before{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;opacity:0.05;background-size:64px 64px}
[data-texture="grass"] body::before{background-image:repeating-linear-gradient(0deg,#22c55e22 0px,transparent 2px),repeating-linear-gradient(90deg,#22c55e22 0px,transparent 2px)}
[data-texture="stone"] body::before{background-image:repeating-linear-gradient(45deg,#64748b22 0px,transparent 2px),repeating-linear-gradient(-45deg,#64748b22 0px,transparent 2px)}
[data-texture="wood"] body::before{background-image:repeating-linear-gradient(0deg,#a1623022 0px,transparent 4px)}

header{position:sticky;top:0;z-index:100;background:var(--bg2);border-bottom:2px solid var(--border);padding:0 24px;display:flex;align-items:center;justify-content:space-between;gap:16px;box-shadow:0 2px 16px rgba(0,0,0,0.4)}
.logo{font-family:'Press Start 2P',monospace;font-size:11px;color:var(--accent2);text-shadow:2px 2px 0 rgba(0,0,0,0.5);white-space:nowrap;padding:16px 0;line-height:1.6}
.logo span{color:var(--accent)}
nav{display:flex;gap:4px}
.nav-btn{font-family:'Press Start 2P',monospace;font-size:8px;padding:10px 14px;border:2px solid var(--border);background:transparent;color:var(--text2);cursor:pointer;transition:all 0.15s;border-radius:var(--radius);white-space:nowrap}
.nav-btn:hover{background:var(--surface);color:var(--text);border-color:var(--accent)}
.nav-btn.active{background:var(--accent);color:#000;border-color:var(--accent);box-shadow:0 0 12px rgba(34,211,238,0.4)}
[data-theme="minecraft"] .nav-btn.active{color:#fff}

main{position:relative;z-index:1}
.section{display:none}
.section.active{display:block}

#cmd-section{display:none}
#cmd-section.active{display:flex;flex-direction:column;height:calc(100vh - 61px)}

.cmd-toolbar{display:flex;gap:8px;align-items:center;flex-wrap:wrap;padding:12px 16px;background:var(--bg2);border-bottom:1px solid var(--border)}
.search-wrap{position:relative;flex:1;min-width:180px}
.search-wrap svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text3);pointer-events:none}
#search-input{width:100%;padding:8px 12px 8px 34px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);font-family:'Nunito',sans-serif;font-size:13px;transition:border-color 0.2s}
#search-input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 2px rgba(34,211,238,0.15)}
#search-input::placeholder{color:var(--text3)}
#cat-filter{padding:8px 10px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);font-family:'Nunito',sans-serif;font-size:13px;cursor:pointer}
#cat-filter:focus{outline:none;border-color:var(--accent)}
.sort-btn{padding:8px 12px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);color:var(--text2);font-size:12px;cursor:pointer;transition:all 0.15s;white-space:nowrap}
.sort-btn:hover,.sort-btn.active{background:var(--surface);color:var(--accent);border-color:var(--accent)}
.cmd-count{font-size:11px;color:var(--text3);white-space:nowrap;margin-left:4px}

.cmd-body{display:flex;flex:1;overflow:hidden}
.cmd-list-wrap{flex:0 0 auto;width:calc(100% - var(--sidebar-w));display:flex;flex-direction:column;border-right:2px solid var(--border);overflow:hidden}
.cmd-list{flex:1;overflow-y:auto;padding:8px}
.cmd-list::-webkit-scrollbar{width:6px}
.cmd-list::-webkit-scrollbar-track{background:var(--bg2)}
.cmd-list::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

.cmd-card{display:flex;align-items:center;gap:12px;padding:10px 12px;margin-bottom:4px;border:1px solid transparent;border-radius:var(--radius);cursor:pointer;transition:all 0.15s;position:relative;animation:fadeSlide 0.15s both}
.cmd-card:hover{background:var(--surface);border-color:var(--border)}
.cmd-card.selected{background:var(--surface);border-color:var(--accent)}
.cmd-card.selected::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--accent);border-radius:var(--radius) 0 0 var(--radius)}
.cmd-icon{width:32px;height:32px;border-radius:var(--radius);display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;background:var(--bg3);border:1px solid var(--border)}
.cmd-info{flex:1;min-width:0}
.cmd-name{font-weight:700;font-size:13px;color:var(--accent);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-family:'Courier New',monospace}
.cmd-cat{font-size:11px;color:var(--text3)}
.cmd-desc-short{font-size:11px;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

[data-card="expanded"] .cmd-card{flex-direction:column;align-items:flex-start;padding:12px}
[data-card="expanded"] .cmd-icon{display:none}
[data-card="expanded"] .cmd-name{font-size:14px}
[data-card="expanded"] .cmd-desc-short{white-space:normal;overflow:visible}

.pagination{display:flex;align-items:center;justify-content:center;gap:4px;padding:10px;border-top:1px solid var(--border);background:var(--bg2)}
.page-btn{width:32px;height:32px;border:1px solid var(--border);background:var(--bg3);color:var(--text2);border-radius:var(--radius);cursor:pointer;font-size:12px;transition:all 0.15s;display:flex;align-items:center;justify-content:center}
.page-btn:hover{background:var(--surface);color:var(--text)}
.page-btn.active{background:var(--accent);color:#000;border-color:var(--accent)}
.page-btn:disabled{opacity:0.3;cursor:not-allowed}

.cmd-sidebar{width:var(--sidebar-w);flex-shrink:0;background:var(--bg2);display:flex;flex-direction:column;overflow-y:auto}
.cmd-sidebar::-webkit-scrollbar{width:6px}
.cmd-sidebar::-webkit-scrollbar-track{background:var(--bg2)}
.cmd-sidebar::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
.sidebar-empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;padding:32px;text-align:center}
.sidebar-empty .empty-icon{font-size:48px;opacity:0.3}
.sidebar-empty p{color:var(--text3);font-size:13px;line-height:1.6}
.sidebar-content{padding:20px;display:flex;flex-direction:column;gap:16px}
.sidebar-header{display:flex;align-items:flex-start;justify-content:space-between;gap:8px}
.sidebar-cmd-name{font-family:'Courier New',monospace;font-size:20px;font-weight:700;color:var(--accent);line-height:1.2}
.sidebar-cat-badge{padding:3px 10px;border-radius:20px;background:var(--surface);border:1px solid var(--border);font-size:11px;color:var(--accent2);white-space:nowrap;font-weight:700}
.sidebar-block{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);padding:14px}
.sidebar-block-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--text3);margin-bottom:8px}
.sidebar-block-value{font-size:13px;color:var(--text2);line-height:1.6}
.sidebar-block.syntax .sidebar-block-value{font-family:'Courier New',monospace;color:var(--accent3);font-size:12px;background:rgba(0,0,0,0.2);padding:8px;border-radius:2px}
.sidebar-block.example .sidebar-block-value{font-family:'Courier New',monospace;color:var(--accent2);font-size:12px}
.copy-btn{margin-top:8px;padding:6px 12px;background:var(--surface);border:1px solid var(--border);color:var(--text2);border-radius:var(--radius);cursor:pointer;font-size:11px;transition:all 0.15s;display:inline-flex;align-items:center;gap:5px}
.copy-btn:hover{background:var(--surface2);color:var(--text);border-color:var(--accent)}
.copy-btn.copied{color:var(--accent2);border-color:var(--accent2)}

#gallery-section{padding:24px}
.gallery-section-title{font-family:'Press Start 2P',monospace;font-size:10px;color:var(--accent2);margin-bottom:20px}
.gallery-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:12px}
.gallery-item{border-radius:var(--radius);overflow:hidden;border:2px solid var(--border);cursor:pointer;transition:all 0.2s;background:var(--surface);aspect-ratio:1;display:flex;align-items:center;justify-content:center;position:relative}
.gallery-item:hover{border-color:var(--accent);transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,0.4)}
.gallery-item canvas{width:100%;height:100%;image-rendering:pixelated}
.gallery-item .img-label{position:absolute;bottom:0;left:0;right:0;background:linear-gradient(transparent,rgba(0,0,0,0.8));padding:20px 10px 8px;font-size:11px;color:#fff;text-align:center}
.lightbox{display:none;position:fixed;inset:0;z-index:999;background:rgba(0,0,0,0.9);align-items:center;justify-content:center;flex-direction:column;gap:12px}
.lightbox.open{display:flex}
.lightbox canvas{max-width:90vw;max-height:80vh;image-rendering:pixelated;border:4px solid var(--border)}
.lightbox-label{color:#fff;font-family:'Press Start 2P',monospace;font-size:9px}
.lightbox-close{position:fixed;top:20px;right:24px;font-size:28px;color:#fff;cursor:pointer;opacity:0.7;background:none;border:none;transition:opacity 0.15s}
.lightbox-close:hover{opacity:1}

#settings-section{padding:24px;max-width:700px;margin:0 auto}
.settings-title{font-family:'Press Start 2P',monospace;font-size:10px;color:var(--accent2);margin-bottom:24px}
.settings-group{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:16px}
.settings-group-title{font-size:11px;font-weight:800;color:var(--text3);text-transform:uppercase;letter-spacing:1px;margin-bottom:16px;padding-bottom:10px;border-bottom:1px solid var(--border)}
.settings-row{display:flex;align-items:center;justify-content:space-between;gap:16px;padding:8px 0}
.settings-label{font-size:14px;color:var(--text2)}
.option-pills{display:flex;gap:6px;flex-wrap:wrap}
.option-pill{padding:6px 14px;border-radius:20px;border:1px solid var(--border);background:var(--bg3);color:var(--text2);font-size:12px;cursor:pointer;transition:all 0.15s}
.option-pill:hover{border-color:var(--accent);color:var(--text)}
.option-pill.active{background:var(--accent);color:#000;border-color:var(--accent)}
[data-theme="minecraft"] .option-pill.active{color:#fff}

.toast{position:fixed;bottom:24px;right:24px;z-index:999;background:var(--accent2);color:#000;padding:10px 20px;border-radius:var(--radius);font-size:13px;font-weight:700;transform:translateY(80px);opacity:0;transition:all 0.3s;pointer-events:none}
.toast.show{transform:translateY(0);opacity:1}
.no-results{text-align:center;padding:48px 24px;color:var(--text3);font-size:14px}
.no-results big{font-size:36px;display:block;margin-bottom:12px}

@media(max-width:768px){
  :root{--sidebar-w:100%}
  .cmd-body{flex-direction:column}
  .cmd-list-wrap{width:100%;border-right:none;border-bottom:2px solid var(--border);height:50vh}
  .cmd-sidebar{height:50vh}
  header{padding:0 12px}
  .logo{font-size:8px}
  .nav-btn{font-size:7px;padding:8px 10px}
  .gallery-grid{grid-template-columns:repeat(auto-fill,minmax(130px,1fr))}
  #settings-section{padding:16px}
}
@media(max-width:480px){.logo{display:none}}
@keyframes fadeSlide{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>

<header>
  <div class="logo">&#9935; Команди<br><span>Дениса</span></div>
  <nav>
    <button class="nav-btn active" onclick="showSection('cmd')">&#9876; Команди</button>
    <button class="nav-btn" onclick="showSection('gallery')">&#128444; Малюнки</button>
    <button class="nav-btn" onclick="showSection('settings')">&#9881; Налаштування</button>
  </nav>
</header>

<main>
<!-- COMMANDS -->
<section id="cmd-section" class="section active">
  <div class="cmd-toolbar">
    <div class="search-wrap">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input id="search-input" type="text" placeholder="Пошук команд..." oninput="onSearch()">
    </div>
    <select id="cat-filter" onchange="onFilter()">
      <option value="">Всі категорії</option>
    </select>
    <button class="sort-btn active" id="sort-alpha" onclick="setSort('alpha')">А–Я</button>
    <button class="sort-btn" id="sort-cat" onclick="setSort('cat')">Категорія</button>
    <span class="cmd-count" id="cmd-count"></span>
  </div>
  <div class="cmd-body">
    <div class="cmd-list-wrap">
      <div class="cmd-list" id="cmd-list"></div>
      <div class="pagination" id="pagination"></div>
    </div>
    <aside class="cmd-sidebar" id="cmd-sidebar">
      <div class="sidebar-empty">
        <div class="empty-icon">&#9935;</div>
        <p>Виберіть команду зі списку,<br>щоб побачити детальну інформацію</p>
      </div>
    </aside>
  </div>
</section>

<!-- GALLERY -->
<section id="gallery-section" class="section">
  <p class="gallery-section-title">&#128444; ГАЛЕРЕЯ ПІКСЕЛЬ-АРТ</p>
  <div class="gallery-grid" id="gallery-grid"></div>
</section>

<!-- SETTINGS -->
<section id="settings-section" class="section">
  <p class="settings-title">&#9881; НАЛАШТУВАННЯ ДИЗАЙНУ</p>
  <div class="settings-group">
    <div class="settings-group-title">&#127912; Тема оформлення</div>
    <div class="settings-row">
      <span class="settings-label">Вибрати тему:</span>
      <div class="option-pills">
        <button class="option-pill active" onclick="setSetting('theme','dark')">🌙 Темна</button>
        <button class="option-pill" onclick="setSetting('theme','light')">☀️ Світла</button>
        <button class="option-pill" onclick="setSetting('theme','minecraft')">⛏ Minecraft</button>
      </div>
    </div>
  </div>
  <div class="settings-group">
    <div class="settings-group-title">&#128288; Розмір шрифту</div>
    <div class="settings-row">
      <span class="settings-label">Розмір тексту:</span>
      <div class="option-pills">
        <button class="option-pill" onclick="setSetting('fontSize','small')">Малий</button>
        <button class="option-pill active" onclick="setSetting('fontSize','medium')">Середній</button>
        <button class="option-pill" onclick="setSetting('fontSize','large')">Великий</button>
      </div>
    </div>
  </div>
  <div class="settings-group">
    <div class="settings-group-title">&#127183; Вигляд карток</div>
    <div class="settings-row">
      <span class="settings-label">Тип карток команд:</span>
      <div class="option-pills">
        <button class="option-pill active" onclick="setSetting('card','compact')">Компактний</button>
        <button class="option-pill" onclick="setSetting('card','expanded')">Розширений</button>
      </div>
    </div>
  </div>
  <div class="settings-group">
    <div class="settings-group-title">&#127807; Фонова текстура</div>
    <div class="settings-row">
      <span class="settings-label">Текстура фону:</span>
      <div class="option-pills">
        <button class="option-pill active" onclick="setSetting('texture','none')">Без</button>
        <button class="option-pill" onclick="setSetting('texture','grass')">🌿 Трава</button>
        <button class="option-pill" onclick="setSetting('texture','stone')">🪨 Камінь</button>
        <button class="option-pill" onclick="setSetting('texture','wood')">🪵 Дерево</button>
      </div>
    </div>
  </div>
</section>
</main>

<div class="lightbox" id="lightbox" onclick="closeLightbox(event)">
  <button class="lightbox-close" onclick="closeLightbox()">✕</button>
  <canvas id="lightbox-canvas" width="512" height="512"></canvas>
  <div class="lightbox-label" id="lightbox-label"></div>
</div>
<div class="toast" id="toast">✓ Скопійовано!</div>

<script>
// ── DATA ──
const COMMANDS=[
  {id:1,name:"/give",category:"Предмети",description:"Видає гравцеві вказаний предмет",syntax:"/give <гравець> <предмет> [кількість]",example:"/give Denys diamond_sword 1",corresponds:"Видає алмазний меч гравцю Denys"},
  {id:2,name:"/tp",category:"Телепортація",description:"Телепортує гравця у вказані координати або до іншого гравця",syntax:"/tp <гравець> <x> <y> <z>",example:"/tp Denys 100 64 200",corresponds:"Переміщує Denys до координат 100,64,200"},
  {id:3,name:"/gamemode",category:"Режими гри",description:"Змінює режим гри для гравця",syntax:"/gamemode <режим> [гравець]",example:"/gamemode creative Denys",corresponds:"Вмикає творчий режим для Denys"},
  {id:4,name:"/time set",category:"Світ",description:"Встановлює час доби у світі",syntax:"/time set <значення|day|night>",example:"/time set day",corresponds:"Встановлює денний час"},
  {id:5,name:"/weather",category:"Світ",description:"Змінює погоду у світі",syntax:"/weather <clear|rain|thunder> [час]",example:"/weather clear",corresponds:"Вмикає сонячну погоду"},
  {id:6,name:"/kill",category:"Гравці",description:"Знищує сутність або гравця",syntax:"/kill [гравець|@e]",example:"/kill @e[type=zombie]",corresponds:"Вбиває всіх зомбі у світі"},
  {id:7,name:"/summon",category:"Сутності",description:"Викликає вказану сутність",syntax:"/summon <сутність> [x y z]",example:"/summon creeper ~ ~ ~",corresponds:"Викликає крипера на поточних координатах"},
  {id:8,name:"/effect give",category:"Ефекти",description:"Додає ефект зілля гравцеві",syntax:"/effect give <гравець> <ефект> [тривалість] [потужність]",example:"/effect give Denys speed 60 2",corresponds:"Дає швидкість 3 рівня на 60 секунд"},
  {id:9,name:"/enchant",category:"Предмети",description:"Зачаровує предмет у руці гравця",syntax:"/enchant <гравець> <зачарування> [рівень]",example:"/enchant Denys sharpness 5",corresponds:"Додає гостроту 5 до зброї"},
  {id:10,name:"/clear",category:"Інвентар",description:"Очищає інвентар гравця",syntax:"/clear [гравець] [предмет]",example:"/clear Denys",corresponds:"Видаляє всі предмети з інвентаря"},
  {id:11,name:"/xp add",category:"Гравці",description:"Додає досвід гравцеві",syntax:"/xp add <гравець> <кількість> [points|levels]",example:"/xp add Denys 100 levels",corresponds:"Дає 100 рівнів досвіду"},
  {id:12,name:"/say",category:"Чат",description:"Виводить повідомлення від імені сервера",syntax:"/say <повідомлення>",example:"/say Привіт всім!",corresponds:"Виводить системне повідомлення у чат"},
  {id:13,name:"/tell",category:"Чат",description:"Відправляє особисте повідомлення гравцеві",syntax:"/tell <гравець> <повідомлення>",example:"/tell Denys Привіт!",corresponds:"Надсилає приватне повідомлення"},

function showSection(name){
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.getElementById(name+'-section').classList.add('active');
  document.querySelectorAll('.nav-btn').forEach((b,i)=>b.classList.toggle('active',['cmd','gallery','settings'][i]===name));
}

function buildCatFilter(){
  const sel=document.getElementById('cat-filter');
  const cats=[...new Set(COMMANDS.map(c=>c.category))].sort();
  cats.forEach(c=>{const o=document.createElement('option');o.value=c;o.textContent=c;sel.appendChild(o);});
}

function getFiltered(){
  const q=document.getElementById('search-input').value.toLowerCase();
  const cat=document.getElementById('cat-filter').value;
  let data=COMMANDS.filter(c=>(!q||c.name.toLowerCase().includes(q)||c.description.toLowerCase().includes(q))&&(!cat||c.category===cat));
  if(sortMode==='alpha') data.sort((a,b)=>a.name.localeCompare(b.name));
  else data.sort((a,b)=>a.category.localeCompare(b.category)||a.name.localeCompare(b.name));
  return data;
}

function renderList(){
  filtered=getFiltered();
  const total=filtered.length;
  const totalPages=Math.max(1,Math.ceil(total/PER_PAGE));
  if(currentPage>totalPages) currentPage=totalPages;
  const start=(currentPage-1)*PER_PAGE;
  const page=filtered.slice(start,start+PER_PAGE);
  document.getElementById('cmd-count').textContent=total+' команд';
  const list=document.getElementById('cmd-list');
  if(page.length===0){list.innerHTML='<div class="no-results"><big>🔍</big>Нічого не знайдено</div>';return;}
  list.innerHTML=page.map((c,i)=>`
    <div class="cmd-card${c.id===selectedId?' selected':''}" onclick="selectCmd(${c.id})" style="animation-delay:${i*0.02}s">
      <div class="cmd-icon">${catIcons[c.category]||'⚙'}</div>
      <div class="cmd-info">
        <div class="cmd-name">${c.name}</div>
        <div class="cmd-cat">${c.category}</div>
        <div class="cmd-desc-short">${c.description}</div>
      </div>
    </div>`).join('');
  renderPagination(totalPages);
}

function renderPagination(totalPages){
  const pg=document.getElementById('pagination');
  if(totalPages<=1){pg.innerHTML='';return;}
  let html=`<button class="page-btn" onclick="goPage(${currentPage-1})" ${currentPage===1?'disabled':''}>‹</button>`;
  for(let p=1;p<=totalPages;p++){
    if(p===1||p===totalPages||Math.abs(p-currentPage)<=1) html+=`<button class="page-btn${p===currentPage?' active':''}" onclick="goPage(${p})">${p}</button>`;
    else if(Math.abs(p-currentPage)===2) html+=`<span style="color:var(--text3);align-self:center;padding:0 2px">…</span>`;
  }
  html+=`<button class="page-btn" onclick="goPage(${currentPage+1})" ${currentPage===totalPages?'disabled':''}>›</button>`;
  pg.innerHTML=html;
}

function goPage(p){currentPage=p;renderList();document.getElementById('cmd-list').scrollTop=0;}
function onSearch(){currentPage=1;renderList();}
function onFilter(){currentPage=1;renderList();}
function setSort(m){
  sortMode=m;
  document.getElementById('sort-alpha').classList.toggle('active',m==='alpha');
  document.getElementById('sort-cat').classList.toggle('active',m==='cat');
  currentPage=1;renderList();
}

function selectCmd(id){
  selectedId=id;
  const c=COMMANDS.find(x=>x.id===id);
  renderList();
  const syn=c.syntax.replace(/'/g,"\\'");
  const ex=c.example.replace(/'/g,"\\'");
  document.getElementById('cmd-sidebar').innerHTML=`
    <div class="sidebar-content">
      <div class="sidebar-header">
        <div class="sidebar-cmd-name">${c.name}</div>
        <div class="sidebar-cat-badge">${catIcons[c.category]||''} ${c.category}</div>
      </div>
      <div class="sidebar-block">
        <div class="sidebar-block-label">📝 Опис</div>
        <div class="sidebar-block-value">${c.description}</div>
      </div>
      <div class="sidebar-block syntax">
        <div class="sidebar-block-label">⌨ Синтаксис</div>
        <div class="sidebar-block-value">${c.syntax}</div>
        <button class="copy-btn" onclick="copyText('${syn}',this)">📋 Копіювати</button>
      </div>
      <div class="sidebar-block example">
        <div class="sidebar-block-label">▶ Приклад</div>
        <div class="sidebar-block-value">${c.example}</div>
        <button class="copy-btn" onclick="copyText('${ex}',this)">📋 Копіювати</button>
      </div>
      <div class="sidebar-block">
        <div class="sidebar-block-label">💡 Результат</div>
        <div class="sidebar-block-value">${c.corresponds}</div>
      </div>
    </div>`;
}

function copyText(text,btn){
  navigator.clipboard.writeText(text).catch(()=>{});
  btn.textContent='✓ Скопійовано!';btn.classList.add('copied');showToast();
  setTimeout(()=>{btn.textContent='📋 Копіювати';btn.classList.remove('copied');},2000);
}
function showToast(){
  const t=document.getElementById('toast');t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2000);
}

// ── GALLERY ──
const GALLERY=[
  {label:"Алмазний меч",fn:drawSword},
  {label:"Золотий меч",fn:drawGoldSword},
  {label:"Залізна кирка",fn:drawPickaxe},
  {label:"Скриня",fn:drawChest},
  {label:"Блок трави",fn:drawGrassBlock},
  {label:"Крипер",fn:drawCreeper},
  {label:"Стів",fn:drawSteve},
  {label:"Ендерперла",fn:drawEnderPearl},
  {label:"Золоте яблуко",fn:drawGoldenApple},
  {label:"TNT",fn:drawTNT},
  {label:"Зілля",fn:drawPotion},
  {label:"Смолоскип",fn:drawTorch},
];

function buildGallery(){
  const grid=document.getElementById('gallery-grid');
  GALLERY.forEach(item=>{
    const div=document.createElement('div');div.className='gallery-item';
    const cv=document.createElement('canvas');cv.width=128;cv.height=128;
    item.fn(cv.getContext('2d'),128);
    div.appendChild(cv);
    const lbl=document.createElement('div');lbl.className='img-label';lbl.textContent=item.label;
    div.appendChild(lbl);
    div.onclick=()=>openLightbox(item.fn,item.label);
    grid.appendChild(div);
  });
}

function openLightbox(fn,label){
  const cv=document.getElementById('lightbox-canvas');
  cv.width=512;cv.height=512;fn(cv.getContext('2d'),512);
  document.getElementById('lightbox-label').textContent=label;
  document.getElementById('lightbox').classList.add('open');
}
function closeLightbox(e){if(!e||e.target===document.getElementById('lightbox')||e.target.className==='lightbox-close') document.getElementById('lightbox').classList.remove('open');}

function px(ctx,x,y,c,S){ctx.fillStyle=c;ctx.fillRect(x*S,y*S,S,S);}

function drawSword(ctx,s=128){
  const S=s/16;ctx.fillStyle='#1a2030';ctx.fillRect(0,0,s,s);
  [[7,1,'#5de6ff'],[7,2,'#5de6ff'],[7,3,'#5de6ff'],[7,4,'#5de6ff'],[7,5,'#5de6ff'],
   [7,6,'#4cc8e0'],[6,6,'#4cc8e0'],[8,5,'#4cc8e0'],
   [7,7,'#3a9cb0'],[6,7,'#c0c0ff'],[8,7,'#c0c0ff'],[7,8,'#8060a0'],
   [7,9,'#8060a0'],[7,10,'#604080']].forEach(([x,y,c])=>px(ctx,x,y,c,S));
}
function drawGoldSword(ctx,s=128){
  const S=s/16;ctx.fillStyle='#1a2030';ctx.fillRect(0,0,s,s);
  [[7,1,'#ffe066'],[7,2,'#ffe066'],[7,3,'#ffe066'],[7,4,'#ffe066'],[7,5,'#ffe066'],
   [7,6,'#ffc840'],[6,6,'#ffc840'],[8,5,'#ffc840'],
   [7,7,'#c89a00'],[6,7,'#e0d080'],[8,7,'#e0d080'],[7,8,'#8060a0'],
   [7,9,'#8060a0'],[7,10,'#604080']].forEach(([x,y,c])=>px(ctx,x,y,c,S));
}
function drawPickaxe(ctx,s=128){
  const S=s/16;ctx.fillStyle='#1a2030';ctx.fillRect(0,0,s,s);
  [[3,2,'#b0c0d0'],[4,2,'#c8d8e8'],[5,2,'#c8d8e8'],[6,2,'#b0c0d0'],
   [3,3,'#b0c0d0'],[7,3,'#c8d8e8'],[4,3,'#9ab0c0'],
   [5,4,'#9ab0c0'],[6,5,'#9ab0c0'],[7,6,'#9ab0c0'],
   [8,7,'#9ab0c0'],[9,8,'#9ab0c0'],[9,9,'#7890a0'],[6,4,'#7890a0']].forEach(([x,y,c])=>px(ctx,x,y,c,S));
}
function drawChest(ctx,s=128){
  const S=s/16;ctx.fillStyle='#1a2030';ctx.fillRect(0,0,s,s);
  for(let x=2;x<14;x++) for(let y=3;y<11;y++){ctx.fillStyle='#8b6020';ctx.fillRect(x*S,y*S,S,S);}
  for(let x=3;x<13;x++){ctx.fillStyle='#a07830';ctx.fillRect(x*S,3*S,S,S);}
  for(let x=2;x<14;x++){ctx.fillStyle='#6b4810';ctx.fillRect(x*S,6*S,S,S);}
  for(let x=6;x<10;x++) for(let y=5;y<8;y++){ctx.fillStyle='#c8a840';ctx.fillRect(x*S,y*S,S,S);}
  ctx.fillStyle='#ffd060';ctx.fillRect(7*S,6*S,2*S,S);
}
function drawGrassBlock(ctx,s=128){
  const S=s/16;
  for(let x=0;x<16;x++) for(let y=0;y<16;y++){
    if(y<3){ctx.fillStyle=Math.random()>0.3?'#4a9a20':'#3a7a18';}
    else if(y===3){ctx.fillStyle='#7a5020';}
    else{ctx.fillStyle=Math.random()>0.5?'#6b4518':'#5a3a10';}
    ctx.fillRect(x*S,y*S,S,S);
  }
}
function drawCreeper(ctx,s=128){
  const S=s/16;ctx.fillStyle='#1a2030';ctx.fillRect(0,0,s,s);
  for(let x=3;x<13;x++) for(let y=1;y<8;y++){ctx.fillStyle='#3a9a30';ctx.fillRect(x*S,y*S,S,S);}
  [[4,3,2,2,'#28701e'],[9,3,2,2,'#28701e'],[5,5,2,3,'#28701e'],[8,5,2,3,'#28701e'],[6,6,4,2,'#28701e']].forEach(([ex,ey,ew,eh,ec])=>{
    ctx.fillStyle=ec;ctx.fillRect(ex*S,ey*S,ew*S,eh*S);});
  [[4,3],[5,3],[9,3],[10,3]].forEach(([ex,ey])=>{ctx.fillStyle='#000';ctx.fillRect(ex*S,ey*S,S,S);});
  for(let x=4;x<7;x++) for(let y=8;y<14;y++){ctx.fillStyle='#3a9a30';ctx.fillRect(x*S,y*S,S,S);}
  for(let x=9;x<12;x++) for(let y=8;y<14;y++){ctx.fillStyle='#3a9a30';ctx.fillRect(x*S,y*S,S,S);}
}
function drawSteve(ctx,s=128){
  const S=s/16;ctx.fillStyle='#1a2030';ctx.fillRect(0,0,s,s);
  for(let x=4;x<12;x++) for(let y=1;y<7;y++){ctx.fillStyle='#c8a870';ctx.fillRect(x*S,y*S,S,S);}
  [[5,3,2,1,'#fff'],[9,3,2,1,'#fff'],[5,3,1,1,'#3060c0'],[10,3,1,1,'#3060c0'],[7,5,2,1,'#c07060']].forEach(([ex,ey,ew,eh,ec])=>{
    ctx.fillStyle=ec;ctx.fillRect(ex*S,ey*S,ew*S,eh*S);});
  for(let x=3;x<13;x++) for(let y=7;y<12;y++){ctx.fillStyle='#2850c0';ctx.fillRect(x*S,y*S,S,S);}
  for(let x=4;x<8;x++) for(let y=12;y<16;y++){ctx.fillStyle='#707070';ctx.fillRect(x*S,y*S,S,S);}
  for(let x=8;x<12;x++) for(let y=12;y<16;y++){ctx.fillStyle='#707070';ctx.fillRect(x*S,y*S,S,S);}
}
function drawEnderPearl(ctx,s=128){
  const S=s/16;ctx.fillStyle='#0a1020';ctx.fillRect(0,0,s,s);
  const r=4,cx=8,cy=7;
  for(let y=cy-r;y<=cy+r;y++) for(let x=cx-r;x<=cx+r;x++){
    const d=Math.sqrt((x-cx)**2+(y-cy)**2);
    if(d<=r){const c=d/r;ctx.fillStyle=`rgb(${Math.floor(30+c*60)},${Math.floor(60+c*80)},${Math.floor(80+c*40)})`;ctx.fillRect(x*S,y*S,S,S);}
  }
  ctx.fillStyle='#80c0e0';ctx.fillRect(7*S,5*S,S,S);
}
function drawGoldenApple(ctx,s=128){
  const S=s/16;ctx.fillStyle='#1a0a00';ctx.fillRect(0,0,s,s);
  const r=4,cx=8,cy=8;
  for(let y=cy-r;y<=cy+r;y++) for(let x=cx-r;x<=cx+r;x++){
    const d=Math.sqrt((x-cx)**2+(y-cy)**2);
    if(d<=r){ctx.fillStyle=d<r*0.6?'#ffd060':'#c89000';ctx.fillRect(x*S,y*S,S,S);}
  }
  ctx.fillStyle='#306020';ctx.fillRect(7*S,3*S,2*S,S);
  ctx.fillRect(6*S,3*S,S,S);ctx.fillRect(9*S,3*S,S,S);
  [5,6,7,8,9,10,11].forEach(x=>{ctx.fillStyle='#c0a000';ctx.fillRect(x*S,4*S,S,2);ctx.fillRect(x*S,12*S,S,2);});
}
function drawTNT(ctx,s=128){
  const S=s/16;ctx.fillStyle='#1a0808';ctx.fillRect(0,0,s,s);
  for(let x=2;x<14;x++) for(let y=2;y<14;y++){
    ctx.fillStyle=(x+y)%2===0?'#c03020':'#902010';ctx.fillRect(x*S,y*S,S,S);
  }
  for(let x=2;x<14;x++){ctx.fillStyle='#e8e8e8';ctx.fillRect(x*S,3*S,S,3*S);ctx.fillRect(x*S,10*S,S,3*S);}
  ctx.fillStyle='#303030';
  [[4,5],[5,5],[6,5],[7,5],[8,5],[4,6],[4,7],[4,8],[5,7],[6,7],[7,7],[8,8],[8,7]].forEach(([x,y])=>ctx.fillRect(x*S,y*S,S,S));
}
function drawPotion(ctx,s=128){
  const S=s/16;ctx.fillStyle='#1a0820';ctx.fillRect(0,0,s,s);
  [[7,2,'#c0c0c0'],[8,2,'#c0c0c0'],[6,3,'#c0c0c0'],[9,3,'#c0c0c0']].forEach(([x,y,c])=>px(ctx,x,y,c,S));
  for(let x=5;x<11;x++) for(let y=5;y<14;y++){
    const d=Math.sqrt((x-7.5)**2+(y-9.5)**2);
    if(d<4){ctx.fillStyle=y<9?'#cc44ff':'#882acc';ctx.fillRect(x*S,y*S,S,S);}
  }
  ctx.fillStyle='#ffffff44';ctx.fillRect(6*S,6*S,S,3*S);
}
function drawTorch(ctx,s=128){
  const S=s/16;ctx.fillStyle='#1a1a00';ctx.fillRect(0,0,s,s);
  [[7,2,'#ffee00'],[8,2,'#ffcc00'],[7,3,'#ff9900'],[8,3,'#ff7700'],
   [7,4,'#cc5500'],[8,4,'#aa3300'],
   [7,5,'#8b6020'],[8,5,'#8b6020'],[7,6,'#8b6020'],[8,6,'#8b6020'],
   [7,7,'#8b6020'],[8,7,'#8b6020'],[7,8,'#8b6020'],[8,8,'#8b6020'],
   [7,9,'#8b6020'],[8,9,'#8b6020'],[7,10,'#8b6020'],[8,10,'#8b6020']].forEach(([x,y,c])=>px(ctx,x,y,c,S));
  ctx.fillStyle='#ffee0030';
  for(let i=0;i<5;i++){const glow=3+i;ctx.globalAlpha=0.08-i*0.015;ctx.fillRect((7-glow)*S,(2-glow)*S,S*(2+glow*2),S*(2+glow*2));}
  ctx.globalAlpha=1;
}

// ── SETTINGS ──
const settingMap={
  theme:{dflt:'dark'},fontSize:{dflt:'medium'},card:{dflt:'compact'},texture:{dflt:'none'}
};
function setSetting(key,val){
  settings[key]=val;localStorage.setItem('denysCmdSettings',JSON.stringify(settings));
  applySettings();
  document.querySelectorAll(`[onclick*="setSetting('${key}'"]`).forEach(btn=>{
    btn.classList.toggle('active',btn.getAttribute('onclick').includes("'"+val+"'"));
  });
}
function applySettings(){
  const root=document.documentElement;
  const theme=settings.theme||'dark';
  root.setAttribute('data-theme',theme==='dark'?'':theme);
  const fs={small:'12px',medium:'14px',large:'16px'};
  root.style.setProperty('--font-size',fs[settings.fontSize||'medium']);
  document.body.setAttribute('data-card',settings.card||'compact');
  root.setAttribute('data-texture',settings.texture||'none');
}
function syncSettingUI(){
  Object.keys(settingMap).forEach(key=>{
    const val=settings[key]||settingMap[key].dflt;
    document.querySelectorAll(`[onclick*="setSetting('${key}'"]`).forEach(btn=>{
      btn.classList.toggle('active',btn.getAttribute('onclick').includes("'"+val+"'"));
    });
  });
}

document.addEventListener('DOMContentLoaded',()=>{
  buildCatFilter();renderList();buildGallery();applySettings();syncSettingUI();
});
</script>
